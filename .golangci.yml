version: "2"
run:
  modules-download-mode: readonly

formatters:
  enable:
    - gofumpt
    - goimports
  exclusions:
    generated: disable

linters:
  exclusions:
    paths:
      - api/v1alpha1
      - pkg/client
  enable:
    - asasalint
    - asciicheck
    - bidichk
    - bodyclose
    - copyloopvar
    - decorder
    - dogsled
    - durationcheck
    - errchkjson
    - fatcontext
    - gocheckcompilerdirectives
    - gocritic
    - goprintffuncname
    - grouper
    - iface
    - inamedparam
    - interfacebloat
    - makezero
    - mirror
    - misspell
    - nilerr
    - nilnesserr
    - nolintlint
    - nosprintfhostport
    - prealloc
    - reassign
    - recvcheck
    - revive
    - rowserrcheck
    - sqlclosecheck
    - staticcheck
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign
    - whitespace
  settings:
    staticcheck:
      checks:
        - all
        - -ST1003
        - -QF1008
    nolintlint:
      require-specific: true
    revive:
      rules:
        - name: unused-parameter

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
