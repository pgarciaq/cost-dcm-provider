title: Fleet Efficiency Scoring
uuid: uc-c3c75d4e-0cf9-444f-b0c2-2e269bf7692b
handle: cost/prod/fleet-efficiency-score
scenario:
  description: >
    Cost tracking aggregates optimization data across the entire fleet of
    managed clusters into an efficiency score — the percentage of
    provisioned resources that are actively utilized. The score is broken
    down by cluster, namespace, and resource type (CPU, memory, storage).
    The operator tracks the score over time to measure the impact of
    right-sizing campaigns and identify the teams or namespaces with the
    most over-provisioned resources.
  actor:
    persona: platform-operations
    profile: prod
  intent: Provide a fleet-wide efficiency metric that tracks resource utilization improvement over time
  success_criteria:
    - Fleet efficiency score is calculated as a percentage of provisioned resources utilized
    - Score is broken down by cluster, namespace, and resource type
    - Historical scores are retained for trend analysis
    - Namespaces with the lowest efficiency are highlighted for remediation
