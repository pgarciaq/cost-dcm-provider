title: Production Markup Enforcement
uuid: uc-7b4ae799-3094-42bb-9b6a-dc1b27d07e3e
handle: cost/prod/markup-enforcement
scenario:
  description: >
    An operator creates a cost instance for a production cluster with 5%
    markup. The production markup enforcement policy detects that the cluster
    is labeled as production and that the requested markup is below the
    organizational minimum of 10%. The policy patches the markup to 10% —
    the request is not rejected, but the value is corrected. The cost
    instance proceeds with the enforced markup.
  actor:
    persona: platform-operator
    profile: prod
  intent: Ensure production clusters always have at least the minimum chargeback markup regardless of operator input
  success_criteria:
    - Policy detects that the target cluster is a production environment
    - Policy patches markup from the requested value to the enforced minimum
    - Request proceeds (not rejected) with the corrected markup
    - Cost tracking is configured with the enforced markup
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: single_gatekeeper
    provider_landscape: single_eligible
    governance_context: compliance_gated
    failure_mode: happy_path
  profile: prod
  expected_domain_interactions:
    - domain: cost/governance
      interaction: enforce_minimum_markup
    - domain: cost/full-cost
      interaction: create_cost_model_with_enforced_markup
