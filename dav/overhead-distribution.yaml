title: Overhead Distribution Across Projects
uuid: uc-792b7c49-81f0-45c9-a37d-23c726f36ece
handle: cost/standard/overhead-distribution
scenario:
  description: >
    The operator configures cost tracking with a distribution model but no
    price list. Platform overhead — control plane, worker node idle capacity,
    unattributed storage, network, and GPU — is categorized and distributed
    proportionally across tenant projects based on their resource usage. The
    operator can see where cluster overhead goes without assigning dollar
    amounts.
  actor:
    persona: platform-operator
    profile: prod
  intent: Categorize and distribute cluster overhead across tenant projects without requiring a price list
  success_criteria:
    - Platform overhead is categorized into control plane, worker unallocated, storage, network, and GPU
    - Overhead is distributed proportionally to tenant projects based on usage
    - Operator can query per-namespace overhead attribution
    - No dollar amounts appear in the output
