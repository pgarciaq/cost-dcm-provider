title: Rate Governance Constrains Unrealistic Rates
uuid: uc-77ed4d5a-b6e2-496b-928a-e50abc12d722
handle: cost/standard/rate-governance-constraint
scenario:
  description: >
    An operator creates a cost instance with CPU rates far below the actual
    cost of infrastructure. Rate governance policy evaluates the request and
    constrains all rate values to an acceptable range. The request is not
    rejected but the rate is adjusted to the nearest valid value. This
    prevents cost underreporting that would distort chargeback and capacity
    planning.
  actor:
    persona: platform-operator
    profile: standard
  intent: Prevent unrealistically low or high rates that would distort cost reporting and chargeback accuracy
  success_criteria:
    - Rate governance policy detects rates outside the acceptable range
    - Rate is constrained (not rejected) to the nearest valid value
    - Markup is constrained to the allowed maximum
    - Cost tracking is configured with the constrained values
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: single_gatekeeper
    provider_landscape: single_eligible
    governance_context: standard_governance
    failure_mode: happy_path
  profile: standard
  expected_domain_interactions:
    - domain: cost/governance
      interaction: constrain_rate_values
