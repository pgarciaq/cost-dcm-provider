title: Tenant Queries Cluster Utilization
uuid: uc-3c2b5745-fd49-4891-8889-2f63fac07f41
handle: cost/standard/tenant-usage-query
scenario:
  description: >
    A tenant queries their cluster's CPU, memory, and storage utilization
    through the cost service's read-only API. No cost model is configured —
    this is basic metering only. Access control ensures the tenant sees only
    their own namespaces and clusters. The tenant uses this data for capacity
    planning and quota adjustment decisions.
  actor:
    persona: tenant
    profile: standard
  intent: View cluster utilization metrics for capacity planning without requiring cost model configuration
  success_criteria:
    - Tenant receives CPU core-hours, memory GB-hours, and storage usage for their cluster
    - Data is filtered to only the tenant's namespaces
    - Cross-tenant data access is denied
    - Query works without any cost model configured
  dimensions:
    lifecycle_phase: new_request
    resource_complexity: single_no_deps
    policy_complexity: system_defaults_only
    provider_landscape: single_eligible
    governance_context: standard_governance
    failure_mode: happy_path
  profile: standard
  expected_domain_interactions:
    - domain: cost/metering
      interaction: query_cluster_utilization
